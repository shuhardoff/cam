<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ハードオフ 相場カメラ</title>
<!-- 相場カメラ v1.1：撮影とアップロードを分離。応答を待たず連続撮影できる（送信は裏でキュー処理） -->
<style>
  *{-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:#0d0b12;color:#f4eee6;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
       -webkit-user-select:none;user-select:none;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#16131c;flex:0 0 auto}
  h1{font-size:14px;margin:0}
  #cfgBtn{background:#2f2740;color:#f4eee6;border:none;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700}
  main{flex:1;display:flex;flex-direction:column;padding:10px;max-width:640px;margin:0 auto;width:calc(100% - 20px);box-sizing:border-box;min-height:0}
  #cfg{display:none;background:#1f1b29;border-radius:14px;padding:12px;margin-bottom:10px}
  #cfg label{display:block;font-size:11px;color:#a99fb8;margin:8px 0 4px}
  #cfg input{width:100%;box-sizing:border-box;background:#16131c;border:1.5px solid #3a3148;color:#f4eee6;
             border-radius:10px;padding:10px;font-size:13px;outline:none}
  #cfg .ok{width:100%;margin-top:10px;background:#2f2740;color:#f4eee6;border:none;border-radius:10px;
           padding:10px;font-size:13px;font-weight:700}
  /* ファインダー：見たままが写る（contain表示）＋丸シャッター重ね置き */
  #stage{position:relative;flex:1;min-height:300px;background:#000;border-radius:16px;overflow:hidden}
  #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  #cmsg{position:absolute;top:10px;left:50%;transform:translateX(-50%);max-width:92%;box-sizing:border-box;
        background:rgba(13,11,18,.78);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;
        color:#37e0a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;z-index:3}
  #cmsg.err{color:#ff8d7e}
  #cmsg:empty{display:none}
  #snap{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:84px;height:84px;border-radius:50%;
        background:#fff;border:5px solid rgba(255,255,255,.4);background-clip:padding-box;box-shadow:0 4px 18px rgba(0,0,0,.5);
        cursor:pointer;z-index:3}
  #snap:active{transform:translateX(-50%) scale(.92)}
  #snap:disabled{opacity:.45}
  #last{position:absolute;left:12px;bottom:16px;width:68px;height:68px;object-fit:cover;border-radius:12px;
        border:2px solid rgba(255,255,255,.55);z-index:3;display:none}
  #stageNote{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
             color:#a99fb8;font-size:13px;line-height:2;padding:20px;z-index:2}
  .shutter{display:none;align-items:center;justify-content:center;background:#ff5d4d;color:#fff;border-radius:18px;
           padding:24px;font-size:23px;font-weight:900;letter-spacing:.06em;
           box-shadow:0 8px 26px rgba(255,93,77,.35);margin-top:10px;flex:0 0 auto}
  #below{flex:0 0 auto}
  #destRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .dchip{background:#2f2740;color:#f4eee6;border:2px solid transparent;border-radius:999px;padding:11px 17px;
         font-size:14px;font-weight:700;cursor:pointer}
  .dchip.on{background:#ff5d4d;border-color:#ffd2cc}
  #destHint{font-size:11px;color:#a99fb8;margin-top:7px;min-height:13px}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;z-index:9}
</style>
</head>
<body>
<header><h1>📷 ハードオフ 相場カメラ</h1><button id="cfgBtn">⚙ 設定</button></header>
<main>
  <div id="cfg">
    <label>プロキシURL（…/exec まで。ラベルアプリの設定と同じもの）</label>
    <input id="gas" placeholder="https://script.google.com/macros/s/～/exec">
    <label>合言葉（CAMERA_KEYを設定している場合のみ）</label>
    <input id="key" placeholder="未設定なら空欄のまま">
    <button class="ok" id="cfgOk">保存して開始</button>
  </div>
  <div id="stage">
    <video id="vid" playsinline autoplay muted></video>
    <div id="cmsg"></div>
    <div id="stageNote"></div>
    <img id="last" alt="">
    <button id="snap" hidden aria-label="撮影して送信"></button>
  </div>
  <label class="shutter" id="fileLabel">📷 撮影する<input id="file" type="file" accept="image/*" capture="environment" hidden></label>
  <div id="below">
    <div id="destRow"></div><div id="destHint"></div>
  </div>
</main>
<div id="flash"></div>
<script>
"use strict";
var $=function(id){return document.getElementById(id)};
function conf(k){return localStorage.getItem(k)||""}
function setConf(k,v){localStorage.setItem(k,v)}
function gasUrl(){ return conf("cam_gas").replace(/[#?].*$/,"").replace(/\/+$/,""); }

/* ---- 設定 ---- */
$("gas").value=conf("cam_gas"); $("key").value=conf("cam_key");
function showCfg(s){ $("cfg").style.display=s?"block":"none"; }
$("cfgBtn").onclick=function(){ showCfg($("cfg").style.display!=="block"); };
$("cfgOk").onclick=function(){
  var u=$("gas").value.trim();
  if(!/^https:\/\/script\.google\.com\/.+\/exec/.test(u)){ msg("プロキシURLの形式が違います（…/exec まで）",1); return; }
  setConf("cam_gas",u); setConf("cam_key",$("key").value.trim());
  showCfg(false); msg("設定を保存しました ✓"); loadReceivers(); startCam();
};
if(!conf("cam_gas")){ showCfg(true); $("stageNote").style.display="flex";
  $("stageNote").textContent="上の ⚙設定 でプロキシURLを保存するとカメラが起動します"; }

var msgTimer=null;
function msg(t,err){ var el=$("cmsg"); el.textContent=t; el.className=err?"err":"";
  if(msgTimer) clearTimeout(msgTimer);
  if(!err && t){ msgTimer=setTimeout(function(){ el.textContent=""; },2500); } }

/* ---- 送り先ボタン ---- */
function markChips(){ var v=conf("cam_dest");
  [].forEach.call(document.querySelectorAll(".dchip"),function(c){ c.className="dchip"+((c.dataset.v||"")===v?" on":""); }); }
function loadReceivers(){
  if(!gasUrl()) return;
  fetch(gasUrl()+"?api=receivers&key="+encodeURIComponent(conf("cam_key")))
    .then(function(r){return r.json();})
    .then(function(o){
      var names=(o&&o.names)||[];
      var row=$("destRow"); row.innerHTML="";
      var all=document.createElement("button"); all.className="dchip"; all.textContent="全部のPCへ"; all.dataset.v="";
      row.appendChild(all);
      names.forEach(function(n){ var b=document.createElement("button"); b.className="dchip"; b.textContent="📩 "+n; b.dataset.v=n; row.appendChild(b); });
      [].forEach.call(row.children,function(b){ b.onclick=function(){ setConf("cam_dest",b.dataset.v); markChips(); }; });
      $("destHint").textContent=names.length?"送り先をタップで選択（記憶されます）":"PC側で受信名を設定して受信ページを開いておくと、ここに送り先ボタンが並びます";
      markChips();
    })
    .catch(function(){ $("destHint").textContent="送り先一覧を取得できませんでした（設定のURLを確認）"; });
}

/* ---- 送信（撮影と切り離し、裏で順番に送る：連続撮影してもシャッターが止まらない）---- */
var upQ=[], upBusy=false;
function queueMsg(){ var n=upQ.length+(upBusy?1:0); if(n>0) msg("送信中… 残り"+n+"件"); }
function enqueuePhoto(d){
  if(!gasUrl()){ msg("先に ⚙設定 でプロキシURLを入れてください",1); showCfg(true); return; }
  upQ.push(d);
  $("last").src=d; $("last").style.display="block";
  queueMsg();
  pumpUpload();
}
function pumpUpload(){
  if(upBusy || !upQ.length) return;
  upBusy=true;
  var d=upQ.shift();
  fetch(gasUrl(), { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({ action:"photo", b64:d, key:conf("cam_key"), dest:conf("cam_dest") }) })
  .then(function(r){ return r.json(); })
  .then(function(o){ if(!(o&&o.ok)) msg("送信失敗: "+((o&&o.error)||"不明なエラー"),1); })
  .catch(function(e){ msg("送信失敗: "+e,1); })
  .finally(function(){ upBusy=false; if(upQ.length){ queueMsg(); pumpUpload(); } else { msg("送信しました ✓"); } });
}
/* 旧名互換 */
function sendPhoto(d){ enqueuePhoto(d); }

/* ---- ライブカメラ（見たまま＝写るまま：contain表示で全範囲をそのまま撮影）---- */
var camStream=null;
function startCam(){
  if(camStream || !gasUrl()) return;
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){ fallback("この環境はライブカメラ非対応です。"); return; }
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:1280} }, audio:false })
  .then(function(st){
    camStream=st; var v=$("vid"); v.srcObject=st;
    try{ v.play(); }catch(e){}
    $("snap").hidden=false; $("stageNote").style.display="none"; $("fileLabel").style.display="none";
  })
  .catch(function(e){ fallback("カメラを使用できませんでした（"+(e&&e.name||e)+"）。"); });
}
function fallback(t){
  $("fileLabel").style.display="flex";
  $("stageNote").style.display="flex";
  $("stageNote").textContent=t+" 下のボタンから標準カメラで撮影します。";
}
$("snap").onclick=function(){
  var v=$("vid"), w=v.videoWidth||0, h=v.videoHeight||0;
  if(!w||!h){ msg("カメラ起動中です。少し待ってからもう一度。",1); return; }
  var mx=1280, sc=Math.min(1,mx/Math.max(w,h));
  var cv=document.createElement("canvas"); cv.width=Math.round(w*sc); cv.height=Math.round(h*sc);
  try{
    cv.getContext("2d").drawImage(v,0,0,cv.width,cv.height);
    var f=$("flash"); f.style.opacity=.7; setTimeout(function(){ f.style.opacity=0; },120);
    enqueuePhoto(cv.toDataURL("image/jpeg",0.8));
    var sb=$("snap"); sb.disabled=true; setTimeout(function(){ sb.disabled=false; }, 350);
  }catch(e){ msg("撮影に失敗しました: "+e,1); }
};

/* ---- フォールバック（標準カメラ）---- */
$("file").onchange=function(){
  var f=this.files&&this.files[0]; this.value=""; if(!f)return;
  msg("送信準備中…");
  var img=new Image(); var url=URL.createObjectURL(f);
  img.onload=function(){
    var mx=1280,w=img.width,h=img.height,sc=Math.min(1,mx/Math.max(w,h));
    var cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    var d=cv.toDataURL("image/jpeg",0.8); URL.revokeObjectURL(url);
    enqueuePhoto(d);
  };
  img.onerror=function(){ msg("画像を読み込めませんでした",1); URL.revokeObjectURL(url); };
  img.src=url;
};

if(conf("cam_gas")){ loadReceivers(); startCam(); }
</script>
</body>
</html>
